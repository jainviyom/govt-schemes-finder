{% extends "base.html" %}
{% block content %}
<h1>Which government schemes am I eligible for?</h1>
<p class="subtitle">Answer a few quick questions. Takes under a minute, no login needed.</p>

<form action="{{ url_for('results') }}" method="post" class="scheme-form">
    <div class="field">
        <label for="age">Your age</label>
        <input type="number" id="age" name="age" min="0" max="120" required>
    </div>

    <div class="field">
        <label>Gender</label>
        <div class="radio-row">
            <label><input type="radio" name="gender" value="male" required> Male</label>
            <label><input type="radio" name="gender" value="female"> Female</label>
            <label><input type="radio" name="gender" value="other"> Other</label>
        </div>
    </div>

    <div class="field">
        <label for="state">State / UT</label>
        <select id="state" name="state" required>
            <option value="" disabled selected>Select your state</option>
            {% for s in states %}
            <option value="{{ s }}">{{ s }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="field">
        <label>Area</label>
        <div class="radio-row">
            <label><input type="radio" name="area_type" value="urban" required> Urban</label>
            <label><input type="radio" name="area_type" value="rural"> Rural</label>
        </div>
    </div>

    <div class="field">
        <label for="annual_income">Annual family income (Rs)</label>
        <input type="number" id="annual_income" name="annual_income" min="0" step="1000" required>
    </div>

    <div class="field">
        <label for="occupation">Occupation</label>
        <select id="occupation" name="occupation" required>
            <option value="" disabled selected>Select occupation</option>
            <option value="farmer">Farmer / Agriculture</option>
            <option value="self_employed">Self-employed / Artisan / Small business</option>
            <option value="salaried">Salaried employee</option>
            <option value="daily_wage">Daily wage labourer</option>
            <option value="student">Student</option>
            <option value="homemaker">Homemaker</option>
            <option value="unemployed">Unemployed</option>
            <option value="retired">Retired</option>
        </select>
    </div>

    <div class="field">
        <label for="social_category">Social category</label>
        <select id="social_category" name="social_category" required>
            <option value="general">General</option>
            <option value="obc">OBC</option>
            <option value="sc">SC</option>
            <option value="st">ST</option>
        </select>
    </div>

    <div class="field">
        <label>Do you hold a BPL / Antyodaya ration card, or an economically weaker section certificate?</label>
        <div class="radio-row">
            <label><input type="radio" name="is_bpl" value="yes" required> Yes</label>
            <label><input type="radio" name="is_bpl" value="no"> No</label>
        </div>
    </div>

    <div class="field">
        <label>Do you have a disability certificate?</label>
        <div class="radio-row">
            <label><input type="radio" name="is_disabled" value="yes" required> Yes</label>
            <label><input type="radio" name="is_disabled" value="no"> No</label>
        </div>
    </div>

    <div class="field">
        <label>Are you currently a student?</label>
        <div class="radio-row">
            <label><input type="radio" name="is_student" value="yes" required> Yes</label>
            <label><input type="radio" name="is_student" value="no"> No</label>
        </div>
    </div>

    <div class="field">
        <label>Are you a widow?</label>
        <div class="radio-row">
            <label><input type="radio" name="is_widow" value="yes" required> Yes</label>
            <label><input type="radio" name="is_widow" value="no"> No</label>
        </div>
    </div>

    <div class="field">
        <label>Do you have a daughter below 10 years of age?</label>
        <div class="radio-row">
            <label><input type="radio" name="has_daughter_under_10" value="yes" required> Yes</label>
            <label><input type="radio" name="has_daughter_under_10" value="no"> No</label>
        </div>
    </div>

    <div class="field">
        <label>Do you run, or want to start, a business?</label>
        <div class="radio-row">
            <label><input type="radio" name="is_business_owner" value="yes" required> Yes</label>
            <label><input type="radio" name="is_business_owner" value="no"> No</label>
        </div>
    </div>

    <div class="field">
        <label>Do you own a pucca (permanent, all-weather) house?</label>
        <div class="radio-row">
            <label><input type="radio" name="owns_pucca_house" value="yes" required> Yes</label>
            <label><input type="radio" name="owns_pucca_house" value="no"> No</label>
        </div>
    </div>

    <button type="submit" class="btn-primary">Check my eligible schemes</button>
</form>
{% endblock %}
