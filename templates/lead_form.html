{% extends "base.html" %}
{% block content %}
<h1>Get help applying</h1>
<p class="subtitle">Leave your details and a verified consultant will call you back to help you apply for <strong>{{ scheme.name }}</strong>.</p>

<form action="{{ url_for('lead', scheme_id=scheme.id) }}" method="post" class="scheme-form">
    <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" required>
    </div>
    <div class="field">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="10-digit mobile number" required>
    </div>
    <div class="field">
        <label for="state">State / UT</label>
        <select id="state" name="state" required>
            <option value="" disabled {{ '' if prefill_state else 'selected' }}>Select your state</option>
            {% for s in states %}
            <option value="{{ s }}" {{ 'selected' if s == prefill_state else '' }}>{{ s }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn-primary">Request a callback</button>
</form>

<p class="back-link"><a href="javascript:history.back()">&larr; Back to results</a></p>
{% endblock %}
